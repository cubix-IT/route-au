name: Weekly Enrichment

on:
  schedule:
    # Sunday 4pm UTC = Monday 2am AEST
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Single destination slug (leave blank for all stale)'
        required: false
      force:
        description: 'Force re-enrich all destinations'
        type: boolean
        default: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache Victoria PBF
        uses: actions/cache@v4
        with:
          path: data/victoria-latest.osm.pbf
          key: victoria-pbf-${{ steps.date.outputs.date }}
          restore-keys: victoria-pbf-

      - name: Run enrichment
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            npm run enrich -- --slug ${{ github.event.inputs.slug }} --no-push
          elif [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run enrich -- --all --force --no-push
          else
            npm run enrich -- --all --no-push
          fi

      - name: Commit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/enrich-runs.jsonl
          git diff --staged --quiet || git commit -m "chore: enrich run $(date +'%Y-%m-%d')"
          git push
